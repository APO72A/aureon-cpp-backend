# AUREON - Nginx Reverse Proxy Configuration
# Place this file in /etc/nginx/sites-available/aureon
# Then: ln -s /etc/nginx/sites-available/aureon /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.dev www.yourdomain.dev;

    # Logging
    access_log /var/log/nginx/aureon.access.log;
    error_log /var/log/nginx/aureon.error.log;

    # Hide Nginx version
    server_tokens off;

    # Proxy to AUREON C++ engine
    location / {
        proxy_pass http://localhost:8080;

        # Pass real client info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}